name: ingest_project1

version: "1.0.0"
config-version: 2

profile: ingest_projects

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  ingest_project1:
    +schema: raw

models:
  ingest_project1:
    +static_analysis: strict
    # Materialize staging models as views, and marts as tables
    staging:
      +schema: stage
      +materialized: view
    marts:
      +materialized: table
