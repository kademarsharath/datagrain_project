version: 2

# Try using these source definitions instead!

sources:
  - name: bronze
    schema: "{{ target.schema }}_raw"
    description: Bronze layer data, as ingested from source systems, with minimal transformation applied.
    tables:
      - name: sales_customers
        description: One record per person who has purchased one or more items
      - name: sales_franchaises
        description: One record per franchisee who operates one or more stores
      - name: sales_suppliers
        description: One record per supplier who provides items for sale
      - name: sales_transactions
        description: One record per transaction where items are sold
        config:
          loaded_at_field: dateTime
          freshness:
            warn_after: {count: 2, period: day}
          # error_after: {count: 4, period: hour}


      - name: raw_customers
        description: One record per person who has purchased one or more items
      - name: raw_orders
        description: One record per order (consisting of one or more order items)
        config:
          loaded_at_field: ordered_at
      - name: raw_items
        description: Items included in an order
      - name: raw_stores
        config:
          loaded_at_field: opened_at
      - name: raw_products
        description: One record per SKU for items sold in stores
      - name: raw_supplies
        description: One record per supply per SKU of items sold in stores